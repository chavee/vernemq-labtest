## VerneMQ Base Configuration
## Managed by: files/vernemq.conf (mounted into container)
## Dynamic settings (listeners, plugins, SSL) are appended by docker-entrypoint.sh
allow_anonymous = off
allow_register_during_netsplit = off
coordinate_registrations = on
## Cluster listener (single-node)
listener.vmq.clustering = 0.0.0.0:44053
## HTTP metrics
listener.http.metrics = 0.0.0.0:8888
## HTTP publish API (vmq_http_pub) on separate listener
listener.http.pub = 0.0.0.0:8090
listener.http.pub.http_modules = vmq_http_pub
http_module.vmq_http_pub.auth.mode = noauth
plugins.vmq_http_pub = on
## Session / queue limits
max_inflight_messages  = 20
max_online_messages    = 1000
max_offline_messages   = 1000
max_message_size       = 0
max_client_id_size     = 100
## Shared subscription policy
shared_subscription_policy = prefer_local
## Systree
systree_enabled  = on
systree_interval = 20000

########## Docker Generated Config ##########
distributed_cookie = nexpieio

nodename = VerneMQ@127.0.0.1

listener.tcp.mqtt = 0.0.0.0:1883

listener.ws.ws = 0.0.0.0:8080

plugins.vmq_passwd = off
plugins.vmq_acl = off

vmq_diversity.redis.host = redis
vmq_diversity.redis.port = 6379
vmq_diversity.redis.pool_size = 5

plugins.vmq_diversity = on
vmq_diversity.auth_postgres.enabled = on
vmq_diversity.postgres.host = postgres
vmq_diversity.postgres.port = 5432
vmq_diversity.postgres.user = postgres
vmq_diversity.postgres.password = 123456
vmq_diversity.postgres.database = iotcore
vmq_diversity.postgres.password_hash_method = bcrypt
vmq_diversity.postgres.pool_size = 5

listener.ssl.mqtts = 0.0.0.0:8883
listener.ssl.mqtts.cafile = /vernemq/etc/ssl/ca.crt
listener.ssl.mqtts.certfile = /vernemq/etc/ssl/server.crt
listener.ssl.mqtts.keyfile = /vernemq/etc/ssl/server.key
listener.ssl.mqtts.require_certificate = off

listener.ssl.x509 = 0.0.0.0:8084
listener.ssl.x509.cafile = /vernemq/etc/ssl/ca.crt
listener.ssl.x509.certfile = /vernemq/etc/ssl/server.crt
listener.ssl.x509.keyfile = /vernemq/etc/ssl/server.key
listener.ssl.x509.require_certificate = on
listener.ssl.x509.use_identity_as_username = on
listener.ssl.x509.mountpoint = x509

listener.wss.wss = 0.0.0.0:443
listener.wss.wss.cafile = /vernemq/etc/ssl/ca.crt
listener.wss.wss.certfile = /vernemq/etc/ssl/server.crt
listener.wss.wss.keyfile = /vernemq/etc/ssl/server.key
listener.wss.wss.require_certificate = off

########## End Docker Generated Config ##########
