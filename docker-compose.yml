services:
  redis:
    image: redis:7-alpine
    container_name: vernemq-redis
    ports:
      - "6380:6379"

  postgres:
    image: postgres:15
    container_name: vernemq-postgres
    environment:
      POSTGRES_USER: vernemq
      POSTGRES_PASSWORD: vernemq_password
      POSTGRES_DB: vernemq_db
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vernemq -d vernemq_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  vernemq:
    depends_on:
      postgres:
        condition: service_healthy



    #---- origin ----------------------------------------

    # container_name: vernemq-loadtest-origin
    # image: vernemq/vernemq:latest

    #-----build เอง ---------------------------------------

    container_name: vernemq-loadtest-selfbuild
    build:
      context: ./vernemq
      dockerfile: Dockerfile
    image: vernemq:buildori

    #--------------------------------------------


    ports:
      - "1883:1883" # MQTT over TCP
    environment:
      DOCKER_VERNEMQ_ACCEPT_EULA: "yes"
      DOCKER_VERNEMQ_LISTENER__TCP__DEFAULT: "0.0.0.0:1883"

      # --- LUA PLUGIN SETTINGS (vmq_diversity) ---
      DOCKER_VERNEMQ_PLUGINS__VMQ_DIVERSITY: "on"
      DOCKER_VERNEMQ_ALLOW_ANONYMOUS: "off"

      # ปิด built-in postgres auth เพราะใช้ custom Lua script แทน
      DOCKER_VERNEMQ_VMQ_DIVERSITY__AUTH_POSTGRES__ENABLED: "off"
      DOCKER_VERNEMQ_VMQ_DIVERSITY__POSTGRES__HOST: "postgres"
      DOCKER_VERNEMQ_VMQ_DIVERSITY__POSTGRES__PORT: "5432"
      DOCKER_VERNEMQ_VMQ_DIVERSITY__POSTGRES__USER: "vernemq"
      DOCKER_VERNEMQ_VMQ_DIVERSITY__POSTGRES__PASSWORD: "vernemq_password"
      DOCKER_VERNEMQ_VMQ_DIVERSITY__POSTGRES__DATABASE: "vernemq_db"
      DOCKER_VERNEMQ_VMQ_DIVERSITY__SCRIPT_DIR: "/etc/vernemq/lua"

      # Tuning for low latency & high throughput
      # - DOCKER_VERNEMQ_MAX_INFLIGHT_MESSAGES=0 # No limit
      # - DOCKER_VERNEMQ_MAX_ONLINE_MESSAGES=10000
      # - DOCKER_VERNEMQ_MAX_CLIENT_ID_SIZE=100
    volumes:
      - ./lua:/etc/vernemq/lua
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "vmq-admin cluster show || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
