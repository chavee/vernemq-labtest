services:
  vernemq:
    image: vernemq/vernemq:latest
    container_name: vernemq-load-test
    ports:
      - "1883:1884" # MQTT over TCP
    environment:
      - DOCKER_VERNEMQ_ACCEPT_EULA=yes
      - DOCKER_VERNEMQ_LISTENER__TCP__DEFAULT=0.0.0.0:1884

      # --- LUA PLUGIN SETTINGS (vmq_diversity) ---
      # เปิด/ปิด Plugin (เปลี่ยนเป็น 'off' เพื่อปิด)
      - DOCKER_VERNEMQ_PLUGINS__VMQ_DIVERSITY=on

      - DOCKER_VERNEMQ_ALLOW_ANONYMOUS=off

      # ปิดไม่ให้มันพยายามต่อ DB/Redis ที่มากับ plugin เริ่มต้น (ป้องกัน Error)
      # - DOCKER_VERNEMQ_VMQ_DIVERSITY__MYSQL__ENABLED=off
      # - DOCKER_VERNEMQ_VMQ_DIVERSITY__POSTGRES__ENABLED=off
      # - DOCKER_VERNEMQ_VMQ_DIVERSITY__MONGODB__ENABLED=off
      # - DOCKER_VERNEMQ_VMQ_DIVERSITY__REDIS__ENABLED=off
      # ชี้พาธไปที่ Lua script ของเรา
      # - DOCKER_VERNEMQ_VMQ_DIVERSITY__SCRIPT_DIR=/etc/vernemq/lua

      # Tuning for low latency & high throughput
      # - DOCKER_VERNEMQ_MAX_INFLIGHT_MESSAGES=0 # No limit
      # - DOCKER_VERNEMQ_MAX_ONLINE_MESSAGES=10000
      # - DOCKER_VERNEMQ_MAX_CLIENT_ID_SIZE=100
    volumes:
      - ./lua:/etc/vernemq/lua
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "vmq-admin cluster show || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
